            color: white;

        .container {

        }

        .header {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #ffd700, #ff69b4, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradient 6s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .sony-badge {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
            font-weight: bold;
        }

        .search-box {
            max-width: 400px;
            margin: 20px auto;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.25);
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            animation: cardFade 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes cardFade {
            to { opacity: 1; }
        }

        .channel-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .channel-logo {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .channel-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .channel-title {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            color: #ffd700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .channel-category {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            text-transform: capitalize;
        }

        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .channel-count {
            text-align: center;
            margin: 10px 0;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .proxy-badge {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 3px;
            margin-left: 5px;
            border: 1px solid #00ff00;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .channel-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .channel-logo { height: 100px; }
            .channel-title { font-size: 12px; padding: 12px; }
        }

        @media (max-width: 480px) {
            .container { padding: 10px; }
            .channel-logo { height: 80px; }
            .channel-title { font-size: 11px; padding: 10px; }
        }

        function displayChannels(channelsToShow) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = '';

            if (channelsToShow.length === 0) {
                grid.innerHTML = '<div class="no-results">🔍 No Sony channels found matching your search</div>';
                return;
            }

            channelsToShow.forEach((channel, index) => {
                const card = document.createElement('a');
                card.className = 'channel-card';
                card.href = `player.html?data=${encodeURIComponent(JSON.stringify(channel))}`;
                card.style.animationDelay = `${index * 0.02}s`;
                
                const proxyBadge = channel.isProxy ? '<span class="proxy-badge">PROXY</span>' : '';
                
                card.innerHTML = `
                    <div class="channel-logo">
                        <img src="${channel.logo}" alt="${channel.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/120x80?text=Sony'">
                    </div>
                    <div class="channel-title">
                        ${channel.title} ${proxyBadge}
                        <div class="channel-category">${channel.category}</div>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            document.getElementById('totalChannels').textContent = allChannels.length;
            document.getElementById('channelCount').textContent = `📡 ${channelsToShow.length} Sony Channels`;
        }

        function filterChannels() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (searchTerm === '') {
                currentChannels = [...allChannels];
            } else {
                currentChannels = allChannels.filter(channel => 
                    channel.title.toLowerCase().includes(searchTerm) ||
                    (channel.category && channel.category.toLowerCase().includes(searchTerm))
                );
            }
            
            displayChannels(currentChannels);
        }

        document.addEventListener('DOMContentLoaded', () => {
            displayChannels(allChannels);
