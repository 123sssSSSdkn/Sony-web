        @keyframes fadeInDown {
            to {

            }
        }

            text-align: center;

            padding: 10px;

            color: #00e8d9;
            text-shadow: 0 0 2px #00e8d9, 0 0 4px #004444;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        a.card {
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            h2 {
                font-size: 1.5em;
            }

            .card img {
                height: 100px;
            }

            .card .title {
                font-size: 13px;
                padding: 10px 0 14px;
                text-shadow: 0 0 1px #00e8d9;
            }
        }
