<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@allinone_reborn - Sony LIV Channels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #ffd700, #ff69b4, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd700;
        }

        .channel-logo {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .channel-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .channel-title {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            color: #ffd700;
        }

        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .channel-grid { grid-template-columns: repeat(2, 1fr); }
            .channel-logo { height: 100px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📺 @allinone_reborn</h1>
            <p>Sony LIV Channels</p>
        </header>

        <div class="channel-grid" id="channelGrid">
            <!-- Channels will be loaded here -->
        </div>

        <footer class="footer">
            <p>© 2024 @allinone_reborn</p>
        </footer>
    </div>

    <script>
        const channels = [
            { id: 'sony-hd', title: 'SONY HD', logo: 'https://jiotvimages.cdn.jio.com/dare_images/images/Sony_HD.png' },
            { id: 'sab-hd', title: 'SAB HD', logo: 'https://jiotvimages.cdn.jio.com/dare_images/images/Sony_SAB_HD.png' },
            { id: 'sony-max-hd', title: 'SONY MAX HD', logo: 'https://jiotvimages.cdn.jio.com/dare_images/images/Sony_Max_HD.png' },
            { id: 'sony-pix-hd', title: 'SONY PIX HD', logo: 'https://jiotvimages.cdn.jio.com/dare_images/images/Sony_Pix_HD.png' }
        ];

        const grid = document.getElementById('channelGrid');
        
        channels.forEach(channel => {
            const card = document.createElement('a');
            card.className = 'channel-card';
            card.href = '#';
            card.innerHTML = `
                <div class="channel-logo">
                    <img src="${channel.logo}" alt="${channel.title}">
                </div>
                <div class="channel-title">${channel.title}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
